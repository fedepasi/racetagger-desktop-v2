name: Claude Issue Triage (support pipeline)

# REPLACED 2026-05-17.
#
# Previous behaviour (auto-comment on every user-feedback issue + sometimes open
# a naive draft PR) has been superseded by the new support pipeline. This
# workflow is now invoked ONLY via workflow_dispatch from the Supabase Edge
# Functions `support-triage` (initial) and `support-followup-submit` (after a
# user fills the follow-up form). The pipeline architecture is described in
# `.claude/plans/stavo-pensando-di-mettere-concurrent-marshmallow.md`.
#
# The job's job:
#  1. fetch the support_tickets row + latest follow-up answers from Supabase,
#  2. fetch the issue body via gh CLI,
#  3. let Claude decide (ask_user / ready_to_implement / reject / duplicate)
#     and POST the result into support_triage_runs,
#  4. flip support_tickets.status to 'pending_review'.
#
# Nothing user-visible (no comment, no PR). Fede approves in the management
# portal `/management-portal/support-queue` — `support-action-approve` then
# decides whether to email the user (ask_user) or dispatch `claude-issue-pr.yml`
# (ready_to_implement).

on:
  workflow_dispatch:
    inputs:
      ticket_id:
        description: 'support_tickets.id (UUID)'
        required: true
      github_issue_number:
        description: 'GitHub issue number on this repo'
        required: true

# Opt into Node 24 for JS actions (Node 20 deprecated, removed Sept 2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      contents: read           # checkout for code search
      issues: read             # gh issue view
      id-token: write          # claude-code-action
      actions: read

    env:
      SUPABASE_URL: https://taompbzifylmdzgbbrpv.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TICKET_ID: ${{ inputs.ticket_id }}
      ISSUE_NUMBER: ${{ inputs.github_issue_number }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository (read-only, for code grep)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code (triage only)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          claude_args: '--allowed-tools Read,Grep,Glob,Write,Edit,Bash(gh issue:*),Bash(curl:*),Bash(jq:*),Bash(cat:*),Bash(echo:*),Bash(mkdir:*),Bash(test:*),Bash(ls:*)'
          prompt: |
            You are RaceTagger's L1 support triager. RaceTagger is a desktop app
            (Electron) that does AI-powered race-number recognition for sports
            photographers. This workflow is invoked after a user opened a
            user-feedback issue, or after they answered a follow-up form. Your
            job is to decide what comes next and persist a structured decision
            to Supabase. NEVER comment on the GitHub issue and NEVER open a PR
            from this workflow — both happen later, after a human approves your
            decision in /management-portal/support-queue.

            ## Inputs available in env

            - $TICKET_ID            — support_tickets.id (UUID)
            - $ISSUE_NUMBER         — GitHub issue number on this repo
            - $SUPABASE_URL         — https://taompbzifylmdzgbbrpv.supabase.co
            - $SUPABASE_SERVICE_ROLE_KEY — service role bearer (DO NOT echo / log)

            ## Step 1 — fetch ticket + history from Supabase

            Use curl to fetch the ticket and its last submitted follow-up
            (if any). The `support_tickets` row has fields: user_id,
            github_repo, github_issue_number, category, language, status,
            current_round, created_at. The latest `support_followup_forms` row
            with status='submitted' (if any) contains the schema we previously
            asked + the answers the user provided.

            ```bash
            curl -sS "$SUPABASE_URL/rest/v1/support_tickets?id=eq.$TICKET_ID&select=*" \
              -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY"

            curl -sS "$SUPABASE_URL/rest/v1/support_followup_forms?ticket_id=eq.$TICKET_ID&status=eq.submitted&select=round,schema,answers&order=round.desc&limit=1" \
              -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY"

            curl -sS "$SUPABASE_URL/rest/v1/support_triage_runs?ticket_id=eq.$TICKET_ID&select=round,claude_decision,claude_output,created_at&order=round.asc" \
              -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY"
            ```

            ## Step 2 — fetch issue body

            `gh issue view $ISSUE_NUMBER --json title,body,labels`

            ## Step 3 — fetch a tiny slice of user context (optional, only if user_id is present)

            ```bash
            USER_ID=<from ticket>
            curl -sS "$SUPABASE_URL/rest/v1/executions?user_id=eq.$USER_ID&select=id,status,sport_category,edge_function_version,total_images,created_at&order=created_at.desc&limit=5" \
              -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY"
            ```

            ## Step 4 — search the codebase for relevant files

            Use Grep/Glob to find the implicated files in the issue body
            (filenames, function names, error strings). Known hot spots:
            - src/utils/raw-preview-native.ts (RAW preview)
            - src/unified-image-processor.ts (main pipeline)
            - src/model-manager.ts (ONNX models)
            - src/auth-service.ts (tokens — READ ONLY, NEVER plan to modify)
            - src/matching/smart-matcher.ts (participant matching)
            - supabase/functions/analyzeImageDesktopV6/ (current EF)

            ## Step 5 — decide

            One of:
            - **ask_user**: information is missing. Produce a SHORT (1–4
              fields max) follow-up form IN THE USER'S LANGUAGE. Do not ask
              things you already asked in a previous round (check the triage
              history). If you've already asked twice and still need more,
              switch to "reject" with note "needs human triage".
            - **ready_to_implement**: the bug is well-scoped, a Claude Code
              coding agent can realistically fix it. Provide an implementation
              plan.
            - **reject**: not actionable.
            - **duplicate**: matches an existing issue. List the issue number.

            ### Hard constraints on the implementation plan (NEVER violate)

            If implementing would require modifying ANY of the following, set
            decision="ask_user" with a question to Fede instead, or "reject":
            - `src/auth-service.ts` or any file matching `*token*` (token logic)
            - any reference to user_tokens / token_transactions / batch_token_reservations
            - existing files under `supabase/migrations/`
            - existing files under `supabase/functions/analyzeImageDesktopV*/` (must add a NEW version)
            - code signing / notarization config

            ## Step 6 — POST the result to Supabase

            Build a JSON file at /tmp/decision.json matching this shape, and
            POST it to the `support_triage_runs` table. Compute `round` =
            (max existing round for this ticket) + 1, starting at 1 for the
            first run.

            ```json
            {
              "ticket_id": "<uuid>",
              "round": <int>,
              "claude_decision": "ask_user" | "ready_to_implement" | "reject" | "duplicate",
              "confidence": <0-100>,
              "claude_output": {
                "decision": "<same as above>",
                "language": "<ISO 639-1>",
                "confidence": <0-100>,
                "reasoning": "<short English rationale>",
                "email_subject": "<localized, only for ask_user>",
                "email_body": "<localized, only for ask_user, 3-5 sentences, no link placeholder>",
                "form_schema": {
                  "title": "<localized>",
                  "intro": "<optional localized>",
                  "fields": [
                    {"name": "...", "type": "text|textarea|select|radio|checkbox|file_upload", "label": "<localized>", "required": true|false, "options": ["..."]}
                  ]
                },
                "implementation_plan": {
                  "summary": "...",
                  "files_to_modify": ["..."],
                  "risks": ["..."],
                  "test_strategy": "..."
                },
                "related_issues": [{"number": <n>, "reason": "..."}]
              },
              "model_used": "claude-code-action"
            }
            ```

            Only include `email_subject`/`email_body`/`form_schema` when
            decision = ask_user. Only include `implementation_plan` when
            decision = ready_to_implement. `related_issues` is optional.

            POST it as an IDEMPOTENT UPSERT. The table has a UNIQUE index on
            (ticket_id, round) (`support_triage_runs_ticket_round_uidx`), so use
            `on_conflict=ticket_id,round` + `Prefer: resolution=merge-duplicates`.
            That way, if the primary triage routine already wrote this
            (ticket_id, round), you UPDATE it in place instead of creating a
            duplicate row that would clutter the support queue. merge-duplicates
            only rewrites the columns in the payload, so any human review fields
            (review_action / reviewed_at) on an existing row are preserved.

            ```bash
            curl -sS -X POST "$SUPABASE_URL/rest/v1/support_triage_runs?on_conflict=ticket_id,round" \
              -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Content-Type: application/json" \
              -H "Prefer: return=minimal,resolution=merge-duplicates" \
              --data-binary @/tmp/decision.json
            ```

            ## Step 7 — update ticket status + language

            ```bash
            curl -sS -X PATCH "$SUPABASE_URL/rest/v1/support_tickets?id=eq.$TICKET_ID" \
              -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Content-Type: application/json" \
              --data '{"status":"pending_review","language":"<detected>","current_round":<round used>}'
            ```

            ## Style / privacy

            - Be terse and concrete (file paths, exact error strings, function
              names). No filler.
            - Do NOT include user-identifying data (email, full path with
              username) in the GitHub-visible parts. The reasoning text lives
              in Supabase and is visible only to Fede.
            - The `racetagger-desktop-v2` repo is PUBLIC. NEVER post comments
              to it from this workflow.
            - NEVER open a PR. NEVER push a branch. NEVER use `gh pr create`.
              The follow-up workflow `claude-issue-pr.yml` is responsible for
              that, and only runs after a human approves your decision.

            ## What success looks like

            A new row in `support_triage_runs` for this ticket, with a sensible
            decision, the ticket flipped to status=pending_review. Fede then
            reviews in the management portal.

      - name: Notify support reviewer (Fede)
        if: success()
        env:
          SUPABASE_URL: ${{ env.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}
          TICKET_ID: ${{ env.TICKET_ID }}
        run: |
          set -euo pipefail
          # Pull the most recent triage run for this ticket (the one Claude
          # just wrote) and POST to notify-support-review which sends a
          # Brevo email to info@racetagger.cloud with a link to the queue.
          LATEST_RUN_ID=$(curl -sS \
            "${SUPABASE_URL}/rest/v1/support_triage_runs?ticket_id=eq.${TICKET_ID}&select=id&order=round.desc,created_at.desc&limit=1" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            | jq -r '.[0].id // empty')

          if [ -z "${LATEST_RUN_ID}" ]; then
            echo "::warning::No triage_run row found for ticket ${TICKET_ID} — notification skipped (Claude may have failed to POST)"
            exit 0
          fi

          # Non-blocking: if notify fails, don't fail the whole workflow.
          curl -sS -X POST "${SUPABASE_URL}/functions/v1/notify-support-review" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            --data "{\"ticket_id\":\"${TICKET_ID}\",\"triage_run_id\":\"${LATEST_RUN_ID}\"}" \
            || echo "::warning::notify-support-review call failed (non-fatal)"
