name: Test and Build

on:
  push:
    branches: [main, release/*, develop]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # TypeScript compilation check (fast, always runs)
  # ──────────────────────────────────────────────
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies (skip native modules)
        run: npm install --ignore-scripts

      - name: Compile TypeScript
        run: npx tsc --noEmit

  # ──────────────────────────────────────────────
  # Build macOS (arm64 + x64) with code signing + notarization
  # ──────────────────────────────────────────────
  build-mac:
    needs: compile
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14       # Apple Silicon runner
            arch: arm64
          - os: macos-14       # Cross-compile x64 on Apple Silicon
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      # Import the Developer ID certificate into a temporary keychain
      - name: Import code signing certificate
        if: env.CSC_LINK != ''
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Decode and import the certificate
          echo "$CSC_LINK" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CSC_KEY_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Allow codesign to access the keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

          # Clean up certificate file
          rm -f $RUNNER_TEMP/certificate.p12

      - name: Build Electron app (macOS ${{ matrix.arch }})
        run: npm run build:mac:${{ matrix.arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing (electron-builder reads these automatically)
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Verify build artifacts
        shell: bash
        run: |
          echo "## macOS ${{ matrix.arch }} Build Artifacts" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -lh release/*.dmg release/*.zip 2>/dev/null || echo "No artifacts found"
          ls -lh release/*.dmg release/*.zip 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No artifacts found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Verify code signing
        if: env.CSC_LINK != ''
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
        run: |
          DMG_FILE=$(find release -name "*.dmg" | head -n 1)
          if [ -n "$DMG_FILE" ]; then
            hdiutil attach "$DMG_FILE" -nobrowse
            VOLUME_PATH=$(find /Volumes -maxdepth 1 -name "*RaceTagger*" | head -n 1)
            if [ -n "$VOLUME_PATH" ]; then
              echo "## Code Signing Verification" >> $GITHUB_STEP_SUMMARY
              codesign --verify --deep --strict --verbose=2 "$VOLUME_PATH/RaceTagger.app" 2>&1 | tee -a $GITHUB_STEP_SUMMARY && echo "✅ Code signing OK" >> $GITHUB_STEP_SUMMARY || echo "❌ Code signing FAILED" >> $GITHUB_STEP_SUMMARY
              hdiutil detach "$VOLUME_PATH" -quiet
            fi
          fi

      - name: Clean up keychain
        if: always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: racetagger-mac-${{ matrix.arch }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
          retention-days: 30

  # ──────────────────────────────────────────────
  # Build Windows x64 with optional code signing
  # ──────────────────────────────────────────────
  build-win:
    needs: compile
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w sharp
        continue-on-error: true

      - name: Compile TypeScript
        run: npm run compile

      # Windows code signing: will use Azure Trusted Signing when configured.
      # For now, builds unsigned. PFX-based signing available as fallback.
      - name: Build Electron app (Windows x64)
        run: npm run build:win:x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify build artifacts
        shell: bash
        run: |
          echo "## Windows x64 Build Artifacts" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -lh release/*.exe release/*.zip 2>/dev/null || echo "No artifacts found"
          ls -lh release/*.exe release/*.zip 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No artifacts found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: racetagger-win-x64
          path: |
            release/*.exe
            release/*.zip
            release/*.blockmap
          retention-days: 30

  # ──────────────────────────────────────────────
  # Release (only on tags or release branches)
  # Creates a GitHub Release with all artifacts
  # ──────────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List all artifacts
        run: find ./artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
